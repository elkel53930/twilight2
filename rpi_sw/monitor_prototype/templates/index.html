<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
  <h2>Camera</h2>
  <img src="/video" width="800">

  <h2>Sensor</h2>
  <div>Distance: <span id="distance"></span></div>
  <div>Angle: <span id="angle"></span></div>

  <h2>Maze</h2>
  <canvas id="maze" width="300" height="300"></canvas>

<script>
const socket = io();

socket.on("state", data => {
  document.getElementById("distance").innerText = data.distance;
  document.getElementById("angle").innerText = data.angle;
  drawMaze(data.maze_pos);
});

function drawMaze(pos){
  const canvas = document.getElementById("maze");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,300,300);
  ctx.fillStyle="lightgray";
  ctx.fillRect(0,0,300,300);
  ctx.fillStyle="red";
  ctx.fillRect(pos[0]*30, pos[1]*30, 30, 30);
}
</script>
</body>
</html>
